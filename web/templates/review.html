<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wrong Answer</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #fff8f8; margin: 0; padding: 0; text-align: center; }
    .container {
      max-width: 720px;
      margin: 24px auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border-top: 4px solid #e53935;
    }
    h2 { color: #e53935; margin-top: 0; }
    img.question-img { max-width: 100%; height: auto; border-radius: 6px; margin-bottom: 16px; }
    .verdict { font-size: 17px; margin: 8px 0; }
    .verdict.wrong  { color: #e53935; }
    .verdict.correct { color: #2e7d32; }
    hr { border: none; border-top: 1px solid #eee; margin: 20px 0; }
    .options-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 12px; }
    .opt-item { text-align: center; }
    .opt-item b { display: block; margin-bottom: 4px; color: #555; }
    .opt-item img { height: 80px; border-radius: 6px; border: 2px solid #eee; }
    .opt-item.is-correct img { border-color: #2e7d32; }
    .opt-item.is-chosen img  { border-color: #e53935; }
    form { margin-top: 24px; }
    button {
      padding: 11px 28px;
      font-size: 15px;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #0d47a1; }
  </style>
</head>
<body>
<div class="container">
  <h2>❌ Wrong answer</h2>

  <img class="question-img" src="/static/quiz_data/{{ question_img }}" alt="Question">

  <div class="verdict wrong">Your answer: <strong>{{ chosen_letter }})</strong></div>
  <div class="verdict correct">Correct answer: <strong>{{ correct_letter }})</strong></div>

  <hr>

  <div class="options-grid">
    {% for label, img in options %}
      {% set idx = loop.index0 %}
      {% set letter = ['A','B','C','D','E'][idx] %}
      <div class="opt-item
        {% if label == correct %} is-correct
        {% elif label == chosen %} is-chosen
        {% endif %}">
        <b>{{ letter }})</b>
        <img src="/static/quiz_data/{{ img }}" alt="{{ letter }}">
      </div>
    {% endfor %}
  </div>

  <form method="post" action="/next">
    <button type="submit">Next question →</button>
  </form>
</div>
</body>
</html>
