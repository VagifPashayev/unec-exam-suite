<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Results</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f8ff; margin: 0; padding: 40px 20px; text-align: center; }
    .card {
      display: inline-block;
      background: #fff;
      padding: 32px 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-width: 420px;
      width: 100%;
    }
    h1 { margin-top: 0; color: #1976d2; }
    .stat { font-size: 18px; margin: 12px 0; color: #333; }
    .stat strong { color: #1976d2; }
    .stat.bad strong { color: #e53935; }
    .stat.streak strong { color: #f57c00; }
    .actions { margin-top: 28px; display: flex; flex-direction: column; gap: 12px; }
    .btn {
      display: block;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #1976d2; color: #fff; }
    .btn-secondary { background: #e3f2fd; color: #1976d2; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎉 Quiz finished!</h1>

    <div class="stat">✅ Correct: <strong>{{ score }} / {{ total }}</strong></div>
    <div class="stat bad">❌ Wrong: <strong>{{ total - score }}</strong></div>
    <div class="stat streak">🔥 Best streak: <strong>{{ streak }}</strong></div>

    <div class="actions">
      <a class="btn btn-primary" href="{{ url_for('download', filename=file) }}">📥 Download results (.docx)</a>
      <a class="btn btn-secondary" href="{{ url_for('index') }}">🔁 Start again</a>
    </div>
  </div>
</body>
</html>
